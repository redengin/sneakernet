[package]
authors = ["Stephen Holstein"]
edition = "2021"
readme = "README.md"
name = "sneakernet"
version = "0.1.0"

[dependencies]
panic-halt = "0.2.0"
# picoserve = "0.10.2" # only supports GET/POST/HEAD (need PUT and DELETE)

# TODO [dependencies.cortex-m]
cortex-m = "0.7.7"
cortex-m-rt = "0.7.4"
cortex-m-semihosting = "0.5.0"

# this lets you use `cargo fix`!
[[bin]]
name = "sneakernet"
test = false
bench = false

[profile.release]
codegen-units = 1 # better optimizations
debug = true # symbols are nice and they don't increase the size on Flash
lto = true # better optimizations
