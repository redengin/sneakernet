[package]
    name = "esp32"
    version = "0.1.0"
    authors = ["redengin"]
    edition = "2021"
    license = "MIT OR Apache-2.0"

[dependencies]
    esp-backtrace = { version = "0.12.0", features = [
        "esp32",
        "exception-handler",
        "panic-handler",
        "println",
    ] }
    esp-hal = { version = "0.18.0", features = [ "esp32" ] }
    esp-println = { version = "0.9.1", features = ["esp32", "log"] }
    esp-hal-embassy = { version = "0.1.0", features = ["esp32", "time-timg0"] }

    embassy-executor = { version = "0.5.0", features = ["task-arena-size-40960"] }

[profile.dev]
    # Rust debug is too slow.
    # For debug builds always builds with some optimization
    opt-level = "s"

[profile.release]
    codegen-units = 1 # LLVM can perform better optimizations using a single thread
    debug = 2
    debug-assertions = false
    incremental = false
    lto = 'fat'
    opt-level = 's'
    overflow-checks = false
