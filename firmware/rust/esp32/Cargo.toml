[package]
    name = "sneakernet-esp32"
    version = "0.1.0"
    authors = ["redengin"]
    edition = "2021"
    license = "MIT OR Apache-2.0"

[features]
default = ["esp32"]
esp32   = ["esp-hal/esp32",   "esp-backtrace/esp32",   "esp-wifi/esp32", "esp-hal-embassy/esp32", "esp-println/esp32"]
# "esp-wifi/esp32", "esp-storage?/esp32", "esp-hal-smartled/esp32"]
# esp32   = ["esp-hal/esp32",   "esp-backtrace/esp32",   "esp-hal-embassy?/esp32",   "esp-println/esp32",   "esp-storage?/esp32",   "esp-wifi?/esp32",   "esp-hal-smartled/esp32"]
# esp32c2 = ["esp-hal/esp32c2", "esp-backtrace/esp32c2", "esp-hal-embassy?/esp32c2", "esp-println/esp32c2", "esp-storage?/esp32c2", "esp-wifi?/esp32c2", ]
# esp32c3 = ["esp-hal/esp32c3", "esp-backtrace/esp32c3", "esp-hal-embassy?/esp32c3", "esp-println/esp32c3", "esp-storage?/esp32c3", "esp-wifi?/esp32c3", "esp-hal-smartled/esp32c3"]
# esp32c6 = ["esp-hal/esp32c6", "esp-backtrace/esp32c6", "esp-hal-embassy?/esp32c6", "esp-println/esp32c6", "esp-storage?/esp32c6", "esp-wifi?/esp32c6", "esp-hal-smartled/esp32c6", "esp-ieee802154/esp32c6"]
# esp32h2 = ["esp-hal/esp32h2", "esp-backtrace/esp32h2", "esp-hal-embassy?/esp32h2", "esp-println/esp32h2", "esp-storage?/esp32h2", "esp-wifi?/esp32h2", "esp-hal-smartled/esp32h2", "esp-ieee802154/esp32h2"]
# esp32s2 = ["esp-hal/esp32s2", "esp-backtrace/esp32s2", "esp-hal-embassy?/esp32s2", "esp-println/esp32s2", "esp-storage?/esp32s2", "esp-wifi?/esp32s2", "esp-hal-smartled/esp32s2"]
# esp32s3 = ["esp-hal/esp32s3", "esp-backtrace/esp32s3", "esp-hal-embassy?/esp32s3", "esp-println/esp32s3", "esp-storage?/esp32s3", "esp-wifi?/esp32s3", "esp-hal-smartled/esp32s3"]


[dependencies]
    embassy-executor = { version = "0.5.0", features = ["task-arena-size-40960"] }

    # FIXME follow repos (as the crate releases are often incomplete)
    esp-hal = { git="https://github.com/esp-rs/esp-hal.git" }
    esp-backtrace = { git="https://github.com/esp-rs/esp-hal.git", features=[
        "panic-handler",
        "exception-handler",
        "println",
        # "defmt",
    ]}
    esp-println = { git="https://github.com/esp-rs/esp-hal.git" }

    esp-hal-embassy = { git="https://github.com/esp-rs/esp-hal.git" }
    esp-wifi = { git="https://github.com/esp-rs/esp-hal.git", features = ["wifi"]}
    # esp-wifi = { git="https://github.com/esp-rs/esp-hal.git", features = ["ipv4", "embassy-net"]}

    # esp-backtrace = { version = "0.12.0", features = [
    #     "esp32",
    #     "exception-handler",
    #     "panic-handler",
    #     "println",
    # ] }
    # esp-println = { version = "0.9.1", features = ["esp32", "log"] }
    # esp-hal = { version = "0.18.0", features = ["esp32"] }
    # esp-hal-embassy = { version = "0.1.0", features = ["esp32", "time-timg0"] }
    # esp-wifi = { version = "0.6.0", features = ["esp32", "wifi", "embassy-net"] }
    
    # # esp-storage = { version = "0.3.0", features = ["esp32"] }
    # # esp-hal-smartled = { version = "0.11.0", features = ["esp32"] }

    # embassy-executor = { version = "0.5.0", features = ["task-arena-size-40960"] }
    # # embassy-net = { version = "0.4.0", features = [ "tcp", "udp", "medium-ethernet"] }
    # embassy-net = { version = "0.4.0", features = ["defmt", "medium-ethernet", "proto-ipv4", "tcp"] }
    # static_cell = { version = "2.1.0", features = ["nightly"] }
    # embassy-time = { version = "0.3.1", features = ["generic-queue-8"] }

    # sneakernet = { path="../" }

[profile.dev]
    # Rust debug is too slow.
    # For debug builds always builds with some optimization
    opt-level = "s"

[profile.release]
    codegen-units = 1 # LLVM can perform better optimizations using a single thread
    debug = 2
    debug-assertions = false
    incremental = false
    lto = 'fat'
    # opt-level = 's'
    opt-level = 3 # required by esp-storage
    overflow-checks = false
