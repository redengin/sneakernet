[package]
    name = "esp32"
    version = "0.1.0"
    authors = ["redengin"]
    edition = "2021"
    license = "MIT OR Apache-2.0"

[dependencies]
    esp-backtrace = { version = "0.12.0", features = [
        "esp32",
        "exception-handler",
        "panic-handler",
        "println",
    ] }
    esp-println = { version = "0.9.1", features = ["esp32", "log"] }
    esp-hal = { version = "0.18.0", features = ["esp32"] }
    esp-hal-embassy = { version = "0.1.0", features = ["esp32", "time-timg0"] }
    esp-wifi = { version = "0.6.0", features = ["esp32", "wifi", "embassy-net"] }
    
    # esp-storage = { version = "0.3.0", features = ["esp32"] }
    # esp-hal-smartled = { version = "0.11.0", features = ["esp32"] }

    embassy-executor = { version = "0.5.0", features = ["task-arena-size-40960"] }
    # embassy-net = { version = "0.4.0", features = [ "tcp", "udp", "medium-ethernet"] }
    embassy-net = { version = "0.4.0", features = ["defmt", "medium-ethernet", "proto-ipv4", "tcp"] }
    static_cell = { version = "2.1.0", features = ["nightly"] }
    embassy-time = { version = "0.3.1", features = ["generic-queue-8"] }

    sneakernet = { path="../" }

[profile.dev]
    # Rust debug is too slow.
    # For debug builds always builds with some optimization
    opt-level = "s"

[profile.release]
    codegen-units = 1 # LLVM can perform better optimizations using a single thread
    debug = 2
    debug-assertions = false
    incremental = false
    lto = 'fat'
    # opt-level = 's'
    opt-level = 3 # required by esp-storage
    overflow-checks = false
