services:
  angular:
    build:
      dockerfile: tools/Docker/angular/Dockerfile
    network_mode: host
    ports:
      - 4200:4200

  rust:
    build:
      dockerfile: tools/Docker/rust/Dockerfile
    user: ${DOCKER_USER:? (to fix) export DOCKER_USER="$(id -u):$(id -g)")}
    volumes:
      - ${HOME}/.cargo:/tmp/.cargo
    environment:
      - USER=${USER:-nobody}
      - CARGO_HOME=/tmp/.cargo

  espressif-idf:
    image: espressif/idf
    user: ${DOCKER_USER:? (to fix) export DOCKER_USER="$(id -u):$(id -g)")}
    environment:
      - HOME=/tmp/sneakernet
    volumes:
      - ~/keystore/:/tmp/sneakernet/keystore
      - .:/tmp/sneakernet/
    working_dir: /tmp/sneakernet/firmware/esp32
